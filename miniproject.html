<!DOCTYPE html>
<html>
<head>
  <title>The Blog App</title>
  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
  }

  body {
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    color: #333;
  }

  header {
    text-align: center;
    padding: 20px;
    color: white;
    font-size: 24px;
    font-weight: bold;
    letter-spacing: 1px;
  }

  .container {
    width: 90%;
    max-width: 800px;
    margin: auto;
  }

  .form-box, .search-box {
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.15);
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 20px;
    color: white;
  }

  input, textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    outline: none;
  }

  textarea {
    resize: none;
  }

  button {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: linear-gradient(45deg, #ff7eb3, #ff758c);
    color: white;
    font-weight: bold;
    transition: 0.3s;
  }

  button:hover {
    transform: scale(1.05);
    opacity: 0.9;
  }

  .post {
    background: white;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
    transition: 0.3s;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  }

  .post:hover {
    transform: translateY(-5px);
  }

  .post h3 {
    margin-bottom: 10px;
  }

  .post p {
    margin-bottom: 10px;
    line-height: 1.5;
  }

  .meta {
    font-size: 12px;
    color: gray;
    margin-bottom: 10px;
  }

  .actions {
    display: flex;
    gap: 10px;
  }

  .like-btn { background: #28a745; }
  .edit-btn { background: #ffc107; }
  .delete-btn { background: #dc3545; }

  .char-count {
    font-size: 12px;
    text-align: right;
    color: #ddd;
  }

  .empty {
    text-align: center;
    color: white;
    margin-top: 30px;
    font-size: 18px;
  }

  @media(max-width: 600px) {
    .container {
      width: 95%;
    }
  }
  .dark {
  background: #121212 !important;
  color: white !important;
}

.dark .form-box,
.dark .search-box {
  background: rgba(255,255,255,0.05);
}

.dark .post {
  background: #1e1e1e;
  color: white;
}

#themeBtn {
  position: absolute;
  right: 20px;
  top: 20px;
  background: black;
}
</style>
</head>

<body>

<header>
  <button onclick="toggleTheme()" id="themeBtn">🌙</button>
  <h1>📝 My Blog</h1>
</header>

<div class="container">

  <div class="form-box">
    <h2>Create / Edit Post</h2>
    <input type="text" id="title" placeholder="Title">
    <textarea id="content" rows="4" placeholder="Write your blog..." oninput="countChars()"></textarea>
    <div class="char-count" id="charCount">0 / 1500</div>
    <button onclick="savePost()">Publish</button>
  </div>

  <div class="search-box">
    <input type="text" placeholder="Search posts..." onkeyup="searchPosts(this.value)">
  </div>
  
  <div id="posts"></div>

</div>

<script>
let posts = JSON.parse(localStorage.getItem("blogs")) || [];
let editIndex = -1;

function saveData() {
  localStorage.setItem("blogs", JSON.stringify(posts));
}

function countChars() {
  let text = document.getElementById("content").value;
  document.getElementById("charCount").innerText = text.length + " / 200";
}

function displayPosts(filtered = posts) {
  let postDiv = document.getElementById("posts");
  postDiv.innerHTML = "";

  if (filtered.length === 0) {
    postDiv.innerHTML = "<p class='empty'>No posts found</p>";
    return;
  }

  filtered.forEach((post, index) => {
    postDiv.innerHTML += `
      <div class="post">
        <h3>${post.title}</h3>
        <p>${post.content}</p>
        <div class="meta">📅 ${post.date} | ❤️ ${post.likes}</div>
        <button class="like-btn" onclick="likePost(${index})">Like</button>
        <button class="edit-btn" onclick="editPost(${index})">Edit</button>
        <button class="delete-btn" onclick="deletePost(${index})">Delete</button>
      </div>
    `;
  });
}

function savePost() {
  let title = document.getElementById("title").value;
  let content = document.getElementById("content").value;

  if (title === "" || content === "") {
    alert("Fill all fields!");
    return;
  
  }

  let date = new Date().toLocaleString();

  if (editIndex === -1) {
    posts.unshift({ title, content, date, likes: 0 });
  } else {
    posts[editIndex] = { ...posts[editIndex], title, content };
    editIndex = -1;
  }

  clearForm();
  saveData();
  displayPosts();
}

function editPost(index) {
  document.getElementById("title").value = posts[index].title;
  document.getElementById("content").value = posts[index].content;
  editIndex = index;
}

function deletePost(index) {
  if (confirm("Delete this post?")) {
    posts.splice(index, 1);
    saveData();
    displayPosts();
  }
}

function likePost(index) {
  posts[index].likes++;
  saveData();
  displayPosts();
}

function searchPosts(query) {
  let filtered = posts.filter(p =>
    p.title.toLowerCase().includes(query.toLowerCase()) ||
    p.content.toLowerCase().includes(query.toLowerCase())
  );
  displayPosts(filtered);
}

function clearForm() {
  document.getElementById("title").value = "";
  document.getElementById("content").value = "";
  document.getElementById("charCount").innerText = "0 / 200";
}

displayPosts();

function toggleTheme() {
  document.body.classList.toggle("dark");

  let mode = document.body.classList.contains("dark") ? "dark" : "light";
  localStorage.setItem("theme", mode);
}

window.onload = function() {
  let saved = localStorage.getItem("theme");
  if (saved === "dark") {
    document.body.classList.add("dark");
  }
};

</script>

</body>
</html>
